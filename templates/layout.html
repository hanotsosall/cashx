<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CashX – Элитное казино</title>
    <!-- Font Awesome 6 (иконки) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
</head>
<body>
    <div class="app">
        <!-- Кнопка мобильного меню (бургер) -->
        <div class="mobile-menu-toggle" id="mobileMenuToggle">
            <i class="fas fa-bars"></i>
        </div>

        <!-- Боковое меню -->
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <i class="fas fa-coins"></i>
                <span>Cash<span class="gold">X</span></span>
            </div>
            <nav class="nav">
                <a href="/" class="nav-link"><i class="fas fa-home"></i> Главная</a>
                <a href="/games" class="nav-link"><i class="fas fa-dice-d6"></i> Все игры</a>
                <a href="/game/slots" class="nav-link"><i class="fas fa-roulette"></i> Слоты</a>
                <a href="/game/mines" class="nav-link"><i class="fas fa-bomb"></i> Mines</a>
                <a href="/game/crash" class="nav-link"><i class="fas fa-rocket"></i> Crash</a>
                <a href="/game/dice" class="nav-link"><i class="fas fa-dice"></i> Dice</a>
                <a href="/game/coinflip" class="nav-link"><i class="fas fa-coins"></i> Coin Flip</a>
                <a href="/game/keno" class="nav-link"><i class="fas fa-bingo"></i> Keno</a>
                <a href="/game/boomcity" class="nav-link"><i class="fas fa-city"></i> Boom City</a>
                <a href="/profile" class="nav-link"><i class="fas fa-user"></i> Профиль</a>
                <a href="/provider_games" class="nav-link"><i class="fas fa-gamepad"></i> Демо-игры</a>
                <a href="/admin" class="nav-link admin-only" style="display:none;"><i class="fas fa-shield-alt"></i> Админка</a>
            </nav>
            <div class="sidebar-footer">
                <div class="online"><i class="fas fa-circle online-dot"></i> <span id="onlineCount">1,234</span> онлайн</div>
                <div class="version">CashX v2.0 | Ultimate Edition</div>
            </div>
        </aside>

        <!-- Основной контент -->
        <main class="main">
            <div class="top-bar">
                <div class="balance-widget">
                    <i class="fas fa-wallet"></i>
                    <span id="balanceAmount">0</span> ₽
                </div>
                <div class="user-area">
                    <span id="usernameDisplay" class="username">Гость</span>
                    <button id="loginNavBtn" class="login-nav-btn"><i class="fas fa-sign-in-alt"></i> Войти</button>
                    <button id="logoutBtn" class="logout-btn" style="display:none;"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
            <div class="content">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Уведомления -->
    <div id="toast" class="toast"></div>

    <!-- Скрипты -->
    <script src="/static/script.js"></script>
    <script src="/static/chat.js"></script>
    <script src="/static/animations.js"></script>
    {% block extra_js %}{% endblock %}

    <!-- Виджет чата (плавающий) -->
<div class="chat-widget" id="chatWidget">
    <div class="chat-header" id="chatHeader">
        <i class="fas fa-comments"></i> Чат CashX
        <button id="chatCloseBtn" class="chat-close"><i class="fas fa-times"></i></button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Написать сообщение...">
        <button id="chatSendBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<style>
    .chat-widget {
        position: fixed;
        bottom: 80px;
        right: 20px;
        width: 320px;
        background: rgba(18,20,35,0.95);
        backdrop-filter: blur(12px);
        border-radius: 24px;
        border: 1px solid #f5b042;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        z-index: 900;
        transition: all 0.3s;
        display: flex;
        flex-direction: column;
    }
    .chat-widget.collapsed .chat-messages,
    .chat-widget.collapsed .chat-input {
        display: none;
    }
    .chat-widget.collapsed {
        width: auto;
        background: transparent;
        border: none;
        box-shadow: none;
        bottom: 20px;
        right: 20px;
    }
    .chat-header {
        padding: 12px 16px;
        background: #f5b042;
        color: #0a0c15;
        border-radius: 24px 24px 0 0;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .chat-close {
        background: none;
        border: none;
        color: #0a0c15;
        font-size: 1rem;
        cursor: pointer;
    }
    .chat-widget.collapsed .chat-header {
        border-radius: 40px;
        background: #f5b042;
        box-shadow: 0 0 10px rgba(245,176,66,0.5);
    }
    .chat-messages {
        height: 300px;
        overflow-y: auto;
        padding: 12px;
        font-size: 0.85rem;
    }
    .chat-message {
        margin-bottom: 8px;
        border-bottom: 1px solid #2f3448;
        padding-bottom: 6px;
    }
    .chat-message strong {
        color: #f5b042;
    }
    .chat-input {
        display: flex;
        border-top: 1px solid #2f3448;
    }
    .chat-input input {
        flex: 1;
        background: transparent;
        border: none;
        padding: 12px;
        color: white;
        outline: none;
    }
    .chat-input button {
        background: #f5b042;
        border: none;
        padding: 0 16px;
        cursor: pointer;
        color: #0a0c15;
        border-radius: 0 0 24px 0;
    }
    @media (max-width: 768px) {
        .chat-widget {
            width: 280px;
            bottom: 10px;
            right: 10px;
        }
    }
</style>

<script>
    // Логика сворачивания/разворачивания чата
    const chatWidget = document.getElementById('chatWidget');
    const chatHeader = document.getElementById('chatHeader');
    const chatClose = document.getElementById('chatCloseBtn');
    chatHeader.addEventListener('click', (e) => {
        if (e.target !== chatClose) {
            chatWidget.classList.toggle('collapsed');
        }
    });
    chatClose.addEventListener('click', (e) => {
        e.stopPropagation();
        chatWidget.classList.add('collapsed');
    });
</script>
</body>
</html>
