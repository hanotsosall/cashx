<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CashX – Играй и выигрывай</title>
    <!-- Font Awesome 6 (иконки) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="shortcut icon" href="/static/favicon.ico">
</head>
<body>
    <!-- ... внутри <body> ... -->
<div class="app">
    <!-- боковое меню (sidebar) можно оставить, но для неавторизованных его можно скрыть, но не обязательно -->
    <aside class="sidebar" id="sidebar">...</aside>

    <main class="main">
        <div class="top-bar">...</div>

        <!-- Блок авторизации (показывается, если пользователь не залогинен) -->
        <div id="authPage" class="page auth-page">
            <div class="auth-container">
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">Вход</button>
                    <button class="auth-tab" data-tab="register">Регистрация</button>
                </div>
                <div id="loginPanel" class="auth-panel active">
                    <input type="text" id="loginUsername" placeholder="Логин">
                    <input type="password" id="loginPassword" placeholder="Пароль">
                    <button id="doLoginBtn" class="btn-primary">Войти</button>
                </div>
                <div id="registerPanel" class="auth-panel">
                    <input type="text" id="regUsername" placeholder="Логин">
                    <input type="password" id="regPassword" placeholder="Пароль">
                    <input type="text" id="regRef" placeholder="Реферальный код (если есть)">
                    <button id="doRegBtn" class="btn-primary">Зарегистрироваться</button>
                </div>
            </div>
        </div>

        <!-- Блок с играми и контентом (показывается только после логина) -->
        <div id="gameArea" class="page" style="display: none;">
            {% block content %}{% endblock %}
        </div>
    </main>
</div>
    <div class="app">
        <!-- Мобильное меню (выдвижное) -->
        <div class="mobile-menu-toggle" id="mobileMenuToggle">
            <i class="fas fa-bars"></i>
        </div>
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <i class="fas fa-coins"></i>
                <span>Cash<span class="gold">X</span></span>
            </div>
            <nav class="nav">
                <a href="/" class="nav-link"><i class="fas fa-home"></i> Главная</a>
                <a href="/games" class="nav-link"><i class="fas fa-dice-d6"></i> Все игры</a>
                <a href="/game/slots" class="nav-link"><i class="fas fa-roulette"></i> Слоты</a>
                <a href="/game/mines" class="nav-link"><i class="fas fa-bomb"></i> Mines</a>
                <a href="/game/crash" class="nav-link"><i class="fas fa-rocket"></i> Crash</a>
                <a href="/game/dice" class="nav-link"><i class="fas fa-dice"></i> Dice</a>
                <a href="/game/coinflip" class="nav-link"><i class="fas fa-coins"></i> Coin Flip</a>
                <a href="/game/keno" class="nav-link"><i class="fas fa-bingo"></i> Keno</a>
                <a href="/game/boomcity" class="nav-link"><i class="fas fa-city"></i> Boom City</a>
                <a href="/profile" class="nav-link"><i class="fas fa-user"></i> Профиль</a>
                {% if user_is_admin %}
                <a href="/admin" class="nav-link"><i class="fas fa-shield-alt"></i> Админка</a>
                {% endif %}
            </nav>
            <div class="sidebar-footer">
                <div class="online"><i class="fas fa-circle online-dot"></i> <span id="onlineCount">1,234</span> онлайн</div>
                <div class="version">CashX v2.0 | Ultimate</div>
            </div>
        </aside>

        <main class="main">
            <div class="top-bar">
                <div class="balance-widget">
                    <i class="fas fa-wallet"></i>
                    <span id="balanceAmount">0</span> ₽
                </div>
                <div class="user-area">
                    <span id="usernameDisplay" class="username">Гость</span>
                    <button id="logoutBtn" class="logout-btn" style="display:none;"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
            <div class="content">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Уведомления -->
    <div id="toast" class="toast"></div>

    <script src="/static/script.js"></script>
    <script src="/static/chat.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
