{% extends "layout.html" %}
{% block content %}
<div class="game-container">
    <h2>🪙 Coin Flip – Орёл или решка</h2>
    <div class="coin" id="coin">🪙</div>
    <div class="game-controls">
        <input type="number" id="coinBet" value="10">
        <button id="coinHeads" class="game-action-btn">Орёл</button>
        <button id="coinTails" class="game-action-btn">Решка</button>
    </div>
    <div id="coinResult" class="result-area"></div>
</div>
<script src="/static/coinflip.js"></script>
{% endblock %}
