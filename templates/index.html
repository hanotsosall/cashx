{% extends "layout.html" %}
{% block content %}
<div class="hero">
    <h1>Добро пожаловать в <span class="gold">CashX</span></h1>
    <p>Мгновенные выплаты, честные игры, огромные бонусы</p>
    <div class="hero-buttons">
        <a href="/games" class="btn btn-primary"><i class="fas fa-play"></i> Играть</a>
        <a href="/profile" class="btn btn-outline"><i class="fas fa-gift"></i> Бонус</a>
    </div>
</div>
<div class="features">
    <div class="feature"><i class="fas fa-bolt"></i> Моментальные выводы</div>
    <div class="feature"><i class="fas fa-chart-line"></i> Коэффициенты до x1000</div>
    <div class="feature"><i class="fas fa-headset"></i> Круглосуточный чат</div>
</div>
<div class="game-previews">
    <div class="game-card" onclick="location.href='/game/slots'"><i class="fas fa-roulette"></i><span>Слоты</span></div>
    <div class="game-card" onclick="location.href='/game/crash'"><i class="fas fa-rocket"></i><span>Crash</span></div>
    <div class="game-card" onclick="location.href='/game/mines'"><i class="fas fa-bomb"></i><span>Mines</span></div>
</div>
{% endblock %}
