{% extends "layout.html" %}
{% block content %}
<div class="profile-container">
    <h2><i class="fas fa-user"></i> Профиль</h2>
    <div class="balance-card">
        <p>Ваш баланс: <strong id="profileBalance">0</strong> ₽</p>
    </div>
    <div class="wallet-section">
        <h3>Пополнение</h3>
        <input type="number" id="depositAmount" placeholder="Сумма">
        <select id="depositMethod">
            <option value="card">Банковская карта</option>
            <option value="crypto">Криптовалюта (USDT)</option>
        </select>
        <button id="depositBtn" class="btn-primary">Пополнить</button>
    </div>
    <div class="wallet-section">
        <h3>Вывод</h3>
        <input type="number" id="withdrawAmount" placeholder="Сумма (мин. 1000₽)">
        <select id="withdrawMethod">
            <option value="card">На карту</option>
            <option value="crypto">На криптокошелёк</option>
        </select>
        <input type="text" id="withdrawAddress" placeholder="Номер карты / адрес кошелька">
        <button id="withdrawBtn" class="btn-success">Вывести</button>
    </div>
    <div class="referral-section">
        <h3>Реферальная ссылка</h3>
        <input type="text" id="refLink" readonly>
        <button id="copyRefBtn">Копировать</button>
    </div>
</div>
<script>
    async function loadBalance() {
        const res = await fetch('/api/user');
        const data = await res.json();
        document.getElementById('profileBalance').innerText = data.balance;
        document.getElementById('refLink').value = `${window.location.origin}/?ref=${data.username}`;
    }
    document.getElementById('depositBtn').onclick = async () => {
        const amount = parseFloat(document.getElementById('depositAmount').value);
        const method = document.getElementById('depositMethod').value;
        if (isNaN(amount) || amount <= 0) return alert('Введите сумму');
        const res = await fetch('/api/deposit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ amount, method })
        });
        const data = await res.json();
        if (data.error) alert(data.error);
        else {
            alert(`Баланс пополнен на ${amount} ₽`);
            loadBalance();
        }
    };
    document.getElementById('withdrawBtn').onclick = async () => {
        const amount = parseFloat(document.getElementById('withdrawAmount').value);
        const method = document.getElementById('withdrawMethod').value;
        const address = document.getElementById('withdrawAddress').value;
        if (isNaN(amount) || amount < 1000) return alert('Мин. вывод 1000₽');
        if (!address) return alert('Укажите реквизиты');
        const res = await fetch('/api/withdraw', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ amount, method, address })
        });
        const data = await res.json();
        if (data.error) alert(data.error);
        else {
            alert(`Заявка на вывод ${amount} ₽ создана`);
            loadBalance();
        }
    };
    document.getElementById('copyRefBtn').onclick = () => {
        const inp = document.getElementById('refLink');
        inp.select();
        document.execCommand('copy');
        alert('Ссылка скопирована');
    };
    loadBalance();
</script>
{% endblock %}
