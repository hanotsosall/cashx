{% extends "layout.html" %}
{% block content %}
<div class="game-container">
    <h2><i class="fas fa-roulette"></i> Slots – Классические слоты</h2>
    <div class="slot-machine">
        <canvas id="slotCanvas" width="800" height="480"></canvas>
        <div class="controls">
            <div class="bet-selector">
                <button class="bet-btn" data-bet="10">10₽</button>
                <button class="bet-btn" data-bet="50">50₽</button>
                <button class="bet-btn" data-bet="100">100₽</button>
                <button class="bet-btn" data-bet="500">500₽</button>
                <input type="number" id="slotBet" value="100" step="10">
            </div>
            <button id="spinBtn" class="btn-primary"><i class="fas fa-play"></i> Крутить</button>
        </div>
        <div id="slotResult" class="result-area"></div>
    </div>
</div>
<script>
    const canvas = document.getElementById('slotCanvas');
    const ctx = canvas.getContext('2d');
    const REEL_W = 140, SYMB_H = 140, REELS = 5, ROWS = 3;

    function drawReels(reels) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let c = 0; c < REELS; c++) {
            for (let r = 0; r < ROWS; r++) {
                const sym = reels[c][r];
                const x = 20 + c * (REEL_W + 8);
                const y = 20 + r * SYMB_H;
                ctx.fillStyle = '#1a1a2a';
                ctx.fillRect(x, y, REEL_W - 6, SYMB_H - 8);
                ctx.fillStyle = sym.color || '#ffdd99';
                ctx.font = '48px "Font Awesome 6 Free", "Segoe UI Emoji"';
                ctx.fillText(sym.icon || sym, x + 40, y + 90);
            }
        }
    }

    async function spin() {
        const bet = parseInt(document.getElementById('slotBet').value);
        if (isNaN(bet) || bet < 10) return alert('Ставка от 10₽');
        const spinBtn = document.getElementById('spinBtn');
        spinBtn.disabled = true;
        try {
            const res = await fetch('/api/slots/spin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bet })
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            // Анимация
            for (let i = 0; i < 10; i++) {
                const fakeReels = Array(REELS).fill().map(() => Array(ROWS).fill({ icon: '💎', color: '#555' }));
                drawReels(fakeReels);
                await new Promise(r => setTimeout(r, 50));
            }
            drawReels(data.reels);
            if (data.win > 0) {
                document.getElementById('slotResult').innerHTML = `🎉 Выигрыш: ${data.win} ₽ 🎉`;
                await updateBalanceUI();
            } else {
                document.getElementById('slotResult').innerHTML = `😭 Проигрыш...`;
            }
            await updateBalanceUI();
        } catch (err) {
            alert(err.message);
        } finally {
            spinBtn.disabled = false;
        }
    }

    document.getElementById('spinBtn').onclick = spin;
    document.querySelectorAll('.bet-btn').forEach(btn => {
        btn.onclick = () => {
            const bet = parseInt(btn.getAttribute('data-bet'));
            document.getElementById('slotBet').value = bet;
        };
    });
</script>
{% endblock %}
