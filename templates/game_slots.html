{% extends "layout.html" %}
{% block content %}
<div class="game-container">
    <h2><i class="fas fa-roulette"></i> SLOTS – Золотые барабаны</h2>
    <div class="slot-machine">
        <canvas id="slotCanvas" width="800" height="480"></canvas>
        <div class="bet-selector">
            <button class="bet-chip" data-bet="10">10₽</button>
            <button class="bet-chip" data-bet="50">50₽</button>
            <button class="bet-chip" data-bet="100">100₽</button>
            <button class="bet-chip" data-bet="500">500₽</button>
            <div class="custom-bet"><input type="number" id="slotBet" value="100" step="10"></div>
        </div>
        <button id="spinBtn" class="btn-primary"><i class="fas fa-play"></i> SPIN</button>
        <div id="slotResult" class="result-area"></div>
    </div>
</div>
<script>
    const canvas = document.getElementById('slotCanvas');
    const ctx = canvas.getContext('2d');
    const REEL_W = 140, SYMB_H = 140, REELS = 5, ROWS = 3;

    function drawReels(reels) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let c = 0; c < REELS; c++) {
            for (let r = 0; r < ROWS; r++) {
                const sym = reels[c][r];
                const x = 20 + c * (REEL_W + 8);
                const y = 20 + r * SYMB_H;
                ctx.fillStyle = '#1a1d2f';
                ctx.fillRect(x, y, REEL_W - 6, SYMB_H - 8);
                ctx.fillStyle = '#ffdd99';
                ctx.font = '48px "Segoe UI Emoji"';
                ctx.fillText(sym, x + 40, y + 90);
                ctx.fillStyle = 'rgba(255,215,0,0.1)';
                ctx.fillRect(x + 5, y + 5, REEL_W - 16, SYMB_H - 18);
            }
        }
    }

    async function spin() {
        const bet = parseInt(document.getElementById('slotBet').value);
        if (isNaN(bet) || bet < 10) return showToast('Ставка от 10₽', true);
        const spinBtn = document.getElementById('spinBtn');
        spinBtn.disabled = true;
        try {
            const res = await fetch('/api/slots/spin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bet })
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            // Анимация прокрутки
            for (let i = 0; i < 12; i++) {
                const fake = Array(REELS).fill().map(() => Array(ROWS).fill('💎'));
                drawReels(fake);
                await new Promise(r => setTimeout(r, 50));
            }
            drawReels(data.reels);
            if (data.win > 0) {
                document.getElementById('slotResult').innerHTML = `🎉 ВЫИГРЫШ: ${data.win} ₽ 🎉`;
                if (window.createConfetti) window.createConfetti();
                if (window.flashScreen) window.flashScreen('#2ecc71');
            } else {
                document.getElementById('slotResult').innerHTML = `😭 ПРОИГРЫШ...`;
            }
            await updateBalanceUI();
        } catch (err) {
            showToast(err.message, true);
        } finally {
            spinBtn.disabled = false;
        }
    }

    document.getElementById('spinBtn').onclick = spin;
    document.querySelectorAll('.bet-chip').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.bet-chip').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('slotBet').value = btn.getAttribute('data-bet');
        };
    });
    // активировать первую кнопку по умолчанию
    document.querySelector('.bet-chip')?.classList.add('active');
</script>
{% endblock %}
