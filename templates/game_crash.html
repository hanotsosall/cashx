{% extends "layout.html" %}
{% block content %}
<div class="game-container">
    <h2><i class="fas fa-rocket"></i> CRASH – Космический рейс</h2>
    <div class="crash-stage">
        <canvas id="crashCanvas" width="600" height="280"></canvas>
        <div class="multiplier-display">
            <span id="crashMultiplier">1.00x</span>
        </div>
    </div>
    <div class="controls">
        <input type="number" id="crashBet" placeholder="Ставка (₽)" value="100" step="50">
        <button id="crashStartBtn" class="btn-primary"><i class="fas fa-play"></i> СТАРТ</button>
        <button id="crashCashoutBtn" class="btn-success" disabled><i class="fas fa-hand-holding-usd"></i> ЗАБРАТЬ</button>
    </div>
    <div id="crashHistory" class="crash-history"></div>
</div>
<script>
    const canvas = document.getElementById('crashCanvas');
    const ctx = canvas.getContext('2d');
    let running = false, intervalId = null, currentSession = null, currentBet = 0;
    let history = [];

    function drawRocket(mult) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const x = 50 + (mult - 1) * 50;
        if (x > canvas.width - 80) return;
        ctx.fillStyle = '#f5b042';
        ctx.beginPath();
        ctx.moveTo(x, canvas.height/2);
        ctx.lineTo(x+50, canvas.height/2 - 25);
        ctx.lineTo(x+50, canvas.height/2 + 25);
        ctx.fill();
        ctx.fillStyle = '#e67e22';
        ctx.fillRect(x+40, canvas.height/2 - 12, 20, 24);
        ctx.fillStyle = '#ff6600';
        ctx.beginPath();
        ctx.moveTo(x-15, canvas.height/2);
        ctx.lineTo(x, canvas.height/2 - 18);
        ctx.lineTo(x, canvas.height/2 + 18);
        ctx.fill();
        ctx.font = 'bold 24px Orbitron';
        ctx.fillStyle = 'white';
        ctx.fillText(mult.toFixed(2)+'x', x+70, canvas.height/2 - 10);
    }

    async function startCrash() {
        const bet = parseInt(document.getElementById('crashBet').value);
        if (isNaN(bet) || bet < 10) return showToast('Ставка от 10₽', true);
        const res = await fetch('/api/crash/start', {
            method: 'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ bet })
        });
        const data = await res.json();
        if (data.error) return showToast(data.error, true);
        currentSession = data.session_id;
        currentBet = bet;
        await updateBalanceUI();
        document.getElementById('crashStartBtn').disabled = true;
        document.getElementById('crashCashoutBtn').disabled = false;
        running = true;
        let multiplier = 1.0;
        drawRocket(1.0);
        intervalId = setInterval(async () => {
            if (!running) return;
            const statusRes = await fetch('/api/crash/status');
            const status = await statusRes.json();
            multiplier = status.multiplier;
            document.getElementById('crashMultiplier').innerText = multiplier.toFixed(2)+'x';
            drawRocket(multiplier);
            if (!status.running) {
                clearInterval(intervalId);
                running = false;
                document.getElementById('crashStartBtn').disabled = false;
                document.getElementById('crashCashoutBtn').disabled = true;
                ctx.fillStyle = '#e74c3c';
                ctx.fillRect(0,0,canvas.width,canvas.height);
                setTimeout(() => drawRocket(multiplier), 600);
                showToast(`💥 КРАШ на x${multiplier.toFixed(2)}!`, true);
                history.unshift(multiplier);
                updateHistory();
                await updateBalanceUI();
            }
        }, 100);
    }

    async function cashout() {
        if (!running) return;
        clearInterval(intervalId);
        const res = await fetch('/api/crash/cashout', {
            method: 'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ session_id: currentSession })
        });
        const data = await res.json();
        if (data.error) return showToast(data.error, true);
        showToast(`💰 Выигрыш: ${data.win} ₽ (x${data.multiplier})`);
        if (window.createConfetti) window.createConfetti();
        await updateBalanceUI();
        running = false;
        document.getElementById('crashStartBtn').disabled = false;
        document.getElementById('crashCashoutBtn').disabled = true;
        history.unshift(data.multiplier);
        updateHistory();
    }

    function updateHistory() {
        const container = document.getElementById('crashHistory');
        container.innerHTML = history.slice(0,10).map(m => `<span class="crash-hist-item">${m.toFixed(2)}x</span>`).join('');
    }

    document.getElementById('crashStartBtn').onclick = startCrash;
    document.getElementById('crashCashoutBtn').onclick = cashout;
</script>
<style>
    .crash-hist-item { display: inline-block; background: #1e2130; padding: 4px 12px; margin: 4px; border-radius: 30px; font-family: monospace; }
</style>
{% endblock %}
