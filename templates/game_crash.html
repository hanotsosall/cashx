{% extends "layout.html" %}
{% block content %}
<div class="game-container crash-game">
    <h2><i class="fas fa-rocket"></i> Crash – Космический рейс</h2>
    <div class="crash-stage">
        <canvas id="crashCanvas" width="600" height="300"></canvas>
        <div class="multiplier-display">
            <span id="crashMultiplier">1.00x</span>
        </div>
    </div>
    <div class="controls">
        <input type="number" id="crashBet" placeholder="Ставка (₽)" value="100" step="100">
        <button id="crashStartBtn" class="btn-primary"><i class="fas fa-play"></i> Старт</button>
        <button id="crashCashoutBtn" class="btn-success" disabled><i class="fas fa-hand-holding-usd"></i> Забрать</button>
    </div>
    <div class="crash-history" id="crashHistory"></div>
</div>
<script>
    const canvas = document.getElementById('crashCanvas');
    const ctx = canvas.getContext('2d');
    let multiplier = 1.0;
    let running = false;
    let intervalId = null;
    let currentBet = 0;
    let currentSession = null;

    function drawRocket(mult) {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        const x = 50 + (mult-1) * 50;
        const y = canvas.height/2;
        ctx.fillStyle = '#ffaa33';
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x+40, y-20);
        ctx.lineTo(x+40, y+20);
        ctx.fill();
        ctx.fillStyle = '#e74c3c';
        ctx.fillRect(x+30, y-8, 20, 16);
        // пламя
        ctx.fillStyle = '#ff6600';
        ctx.beginPath();
        ctx.moveTo(x-10, y);
        ctx.lineTo(x, y-15);
        ctx.lineTo(x, y+15);
        ctx.fill();
        // текст множителя
        ctx.font = 'bold 24px Orbitron';
        ctx.fillStyle = 'gold';
        ctx.fillText(mult.toFixed(2)+'x', x+60, y-10);
    }

    async function startCrash() {
        const bet = parseInt(document.getElementById('crashBet').value);
        if(isNaN(bet) || bet<=0) return alert('Введите ставку');
        const res = await fetch('/api/crash/start', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({bet})
        });
        const data = await res.json();
        if(data.error) return alert(data.error);
        currentBet = bet;
        currentSession = data.session_id;
        updateBalanceUI();
        document.getElementById('crashStartBtn').disabled = true;
        document.getElementById('crashCashoutBtn').disabled = false;
        running = true;
        multiplier = 1.0;
        drawRocket(1.0);
        intervalId = setInterval(async () => {
            if(!running) return;
            const statusRes = await fetch('/api/crash/status');
            const status = await statusRes.json();
            multiplier = status.multiplier;
            document.getElementById('crashMultiplier').innerText = multiplier.toFixed(2)+'x';
            drawRocket(multiplier);
            if(!status.running) {
                // краш
                clearInterval(intervalId);
                running = false;
                document.getElementById('crashStartBtn').disabled = false;
                document.getElementById('crashCashoutBtn').disabled = true;
                // анимация взрыва
                ctx.fillStyle = 'red';
                ctx.fillRect(0,0,canvas.width,canvas.height);
                setTimeout(()=>drawRocket(multiplier), 500);
                await updateBalanceUI();
            }
        }, 100);
    }

    async function cashout() {
        if(!running) return;
        clearInterval(intervalId);
        const res = await fetch('/api/crash/cashout', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({session_id: currentSession})
        });
        const data = await res.json();
        if(data.error) alert(data.error);
        else {
            alert(`Выигрыш: ${data.win} ₽ (x${data.multiplier})`);
            updateBalanceUI();
        }
        running = false;
        document.getElementById('crashStartBtn').disabled = false;
        document.getElementById('crashCashoutBtn').disabled = true;
    }

    document.getElementById('crashStartBtn').onclick = startCrash;
    document.getElementById('crashCashoutBtn').onclick = cashout;
</script>
{% endblock %}
