{% extends "layout.html" %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Вход</button>
            <button class="auth-tab" data-tab="register">Регистрация</button>
        </div>
        <div id="loginPanel" class="auth-panel active">
            <div class="input-group"><i class="fas fa-user"></i><input type="text" id="loginUsername" placeholder="Логин"></div>
            <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="Пароль"></div>
            <button id="doLoginBtn" class="btn-primary">Войти</button>
            <div class="demo-hint"><i class="fas fa-info-circle"></i> Демо: admin / admin123</div>
        </div>
        <div id="registerPanel" class="auth-panel">
            <div class="input-group"><i class="fas fa-user"></i><input type="text" id="regUsername" placeholder="Логин"></div>
            <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="regPassword" placeholder="Пароль"></div>
            <div class="input-group"><i class="fas fa-gift"></i><input type="text" id="regRef" placeholder="Реферальный код (необязательно)"></div>
            <button id="doRegBtn" class="btn-primary">Зарегистрироваться</button>
            <div class="demo-hint"><i class="fas fa-gem"></i> При регистрации вы получаете стартовый баланс 0₽ (пополните через профиль)</div>
        </div>
    </div>
</div>
<script>
    document.getElementById('doLoginBtn').onclick = async () => {
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        const res = await fetch('/api/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
        const data = await res.json();
        if(data.error) showToast(data.error, true);
        else { localStorage.setItem('cashx_user', JSON.stringify(data.user)); window.location.href='/'; }
    };
    document.getElementById('doRegBtn').onclick = async () => {
        const username = document.getElementById('regUsername').value;
        const password = document.getElementById('regPassword').value;
        const ref = document.getElementById('regRef').value;
        const res = await fetch('/api/register', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password,ref_code:ref})});
        const data = await res.json();
        if(data.error) showToast(data.error, true);
        else { localStorage.setItem('cashx_user', JSON.stringify(data.user)); window.location.href='/'; }
    };
    document.querySelectorAll('.auth-tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active'));
            tab.classList.add('active');
            document.querySelectorAll('.auth-panel').forEach(p=>p.classList.remove('active'));
            document.getElementById(tab.getAttribute('data-tab')+'Panel').classList.add('active');
        };
    });
</script>
<style>
    .demo-hint {
        margin-top: 20px;
        font-size: 0.8rem;
        color: #a0a5c0;
        text-align: center;
    }
</style>
{% endblock %}
