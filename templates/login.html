{% extends "layout.html" %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Вход</button>
            <button class="auth-tab" data-tab="register">Регистрация</button>
        </div>
        <div id="loginPanel" class="auth-panel active">
            <div class="input-group"><i class="fas fa-user"></i><input type="text" id="loginUsername" placeholder="Логин"></div>
            <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="Пароль"></div>
            <button id="doLoginBtn" class="btn-primary">Войти</button>
        </div>
        <div id="registerPanel" class="auth-panel">
            <div class="input-group"><i class="fas fa-user"></i><input type="text" id="regUsername" placeholder="Логин"></div>
            <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="regPassword" placeholder="Пароль"></div>
            <div class="input-group"><i class="fas fa-gift"></i><input type="text" id="regRef" placeholder="Реферальный код"></div>
            <button id="doRegBtn" class="btn-primary">Зарегистрироваться</button>
        </div>
    </div>
</div>
<style>
.auth-page { display: flex; justify-content: center; align-items: center; min-height: 70vh; }
.auth-card { background: rgba(18,20,35,0.8); backdrop-filter: blur(12px); border-radius: 48px; padding: 40px; width: 400px; border: 1px solid rgba(245,176,66,0.3); }
.auth-tabs { display: flex; gap: 20px; margin-bottom: 30px; }
.auth-tab { flex:1; background: none; border: none; color: #a0a5c0; font-size: 1.2rem; padding: 10px; cursor: pointer; border-bottom: 2px solid transparent; }
.auth-tab.active { color: #f5b042; border-bottom-color: #f5b042; }
.input-group { display: flex; align-items: center; background: #1e2130; border-radius: 60px; margin-bottom: 20px; padding: 4px 20px; border: 1px solid #2f3448; }
.input-group i { color: #f5b042; margin-right: 12px; }
.input-group input { background: transparent; border: none; padding: 14px 0; color: white; width: 100%; outline: none; }
.btn-primary { background: linear-gradient(95deg, #f5b042, #c47d2e); border: none; padding: 12px; border-radius: 60px; font-weight: bold; width: 100%; cursor: pointer; }
</style>
<script>
    document.getElementById('doLoginBtn').onclick = async () => {
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        const res = await fetch('/api/login', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({username, password})
        });
        const data = await res.json();
        if(data.error) alert(data.error);
        else { localStorage.setItem('cashx_user', JSON.stringify(data.user)); window.location.href='/'; }
    };
    document.getElementById('doRegBtn').onclick = async () => {
        const username = document.getElementById('regUsername').value;
        const password = document.getElementById('regPassword').value;
        const ref = document.getElementById('regRef').value;
        const res = await fetch('/api/register', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({username, password, ref_code: ref})
        });
        const data = await res.json();
        if(data.error) alert(data.error);
        else { localStorage.setItem('cashx_user', JSON.stringify(data.user)); window.location.href='/'; }
    };
    document.querySelectorAll('.auth-tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active'));
            tab.classList.add('active');
            document.querySelectorAll('.auth-panel').forEach(p=>p.classList.remove('active'));
            document.getElementById(tab.getAttribute('data-tab')+'Panel').classList.add('active');
        };
    });
</script>
{% endblock %}
