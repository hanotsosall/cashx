{% extends "layout.html" %}
{% block content %}
<div class="admin-container">
    <h2><i class="fas fa-shield-alt"></i> Админ-панель CashX</h2>
    <div class="admin-section">
        <h3>Пользователи</h3>
        <table class="admin-table">
            <thead>
                <tr><th>ID</th><th>Логин</th><th>Баланс (₽)</th><th>Роль</th><th>Действие</th></tr>
            </thead>
            <tbody id="adminUsersTable"></tbody>
        </table>
    </div>
    <div class="admin-section">
        <h3>Выдать / изменить баланс</h3>
        <input type="text" id="adminUsername" placeholder="Логин пользователя">
        <input type="number" id="adminAmount" placeholder="Новый баланс (₽)">
        <button id="adminSetBalanceBtn" class="btn-primary">Установить баланс</button>
    </div>
</div>
<script>
    async function loadUsers() {
        const res = await fetch('/api/admin/users');
        const users = await res.json();
        const tbody = document.getElementById('adminUsersTable');
        tbody.innerHTML = '';
        users.forEach(u => {
            const row = tbody.insertRow();
            row.insertCell().innerText = u.id;
            row.insertCell().innerText = u.username;
            row.insertCell().innerText = u.balance;
            row.insertCell().innerText = u.is_admin ? 'Админ' : 'Игрок';
            const actionCell = row.insertCell();
            const delBtn = document.createElement('button');
            delBtn.innerText = '✖';
            delBtn.style.background = '#e74c3c';
            delBtn.style.border = 'none';
            delBtn.style.borderRadius = '30px';
            delBtn.style.padding = '4px 10px';
            delBtn.style.cursor = 'pointer';
            delBtn.onclick = () => deleteUser(u.id);
            actionCell.appendChild(delBtn);
        });
    }
    async function deleteUser(userId) {
        if (confirm('Удалить пользователя?')) {
            await fetch(`/api/admin/user/${userId}`, { method: 'DELETE' });
            loadUsers();
        }
    }
    document.getElementById('adminSetBalanceBtn').onclick = async () => {
        const username = document.getElementById('adminUsername').value;
        const balance = parseFloat(document.getElementById('adminAmount').value);
        if (!username || isNaN(balance)) return alert('Заполните поля');
        const res = await fetch('/api/admin/user_balance', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, balance })
        });
        const data = await res.json();
        if (data.error) alert(data.error);
        else {
            alert('Баланс обновлён');
            loadUsers();
        }
    };
    loadUsers();
</script>
<style>
    .admin-section { margin: 30px 0; padding: 20px; background: rgba(0,0,0,0.5); border-radius: 30px; }
    .admin-table { width: 100%; border-collapse: collapse; }
    .admin-table th, .admin-table td { padding: 8px; text-align: left; border-bottom: 1px solid #333; }
    .admin-table th { background: #ffaa33; color: black; }
</style>
{% endblock %}
